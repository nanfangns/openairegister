{% extends "base.html" %}
{% block content %}
<section class="grid cols-3" style="margin-bottom:20px;">
  <article class="panel stat-card animate-in" style="--stat-accent:var(--ok);">
    <div class="stat-row">
      <div class="stat-icon" style="background:var(--ok-dim);color:var(--ok);">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 14l4-4 4 4 6-8 2 2"/></svg>
      </div>
      <div>
        <div class="muted" style="font-size:0.78rem;margin-bottom:4px;">活跃账号</div>
        <div class="stat-value" id="activeCount" style="color:var(--ok);"><span class="skeleton" style="display:inline-block;width:50px;height:36px;vertical-align:middle;"></span></div>
      </div>
    </div>
    <div class="progress-bar" style="margin-top:14px;">
      <div class="progress-bar-fill" id="poolProgress" style="width:0%;background:var(--ok);"></div>
    </div>
    <div class="muted mono" style="font-size:0.75rem;margin-top:6px;" id="poolRatio"></div>
  </article>

  <article class="panel stat-card animate-in" style="--stat-accent:var(--accent);">
    <div class="stat-row">
      <div class="stat-icon" style="background:var(--accent-dim);color:var(--accent);">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10" cy="10" r="8"/><path d="M10 5v5l4 2.5"/></svg>
      </div>
      <div>
        <div class="muted" style="font-size:0.78rem;margin-bottom:4px;">目标池大小</div>
        <div class="stat-value" id="targetCount" style="color:var(--accent);"><span class="skeleton" style="display:inline-block;width:50px;height:36px;vertical-align:middle;"></span></div>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;align-items:center;gap:6px;">
      <span class="muted" style="font-size:0.78rem;">注册并发</span>
      <span class="mono" id="concurrencyDisplay" style="color:var(--text);font-weight:600;font-size:0.95rem;">-</span>
    </div>
  </article>

  <article class="panel stat-card animate-in" style="--stat-accent:var(--warn);">
    <div class="stat-row">
      <div class="stat-icon" id="schedulerIcon" style="background:var(--warn-dim);color:var(--warn);">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="10" cy="10" r="8"/><path d="M10 6v4l3 2"/></svg>
      </div>
      <div>
        <div class="muted" style="font-size:0.78rem;margin-bottom:4px;">调度器状态</div>
        <div class="stat-value" id="schedulerState" style="font-size:1.5rem;"><span class="skeleton" style="display:inline-block;width:60px;height:30px;vertical-align:middle;"></span></div>
      </div>
    </div>
    <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px;">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.82rem;">
        <span class="toggle">
          <input id="autoRegister" type="checkbox" onchange="toggleJob('auto_register', this.checked)">
          <span class="toggle-slider"></span>
        </span>
        <span>自动注册</span>
      </label>
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.82rem;">
        <span class="toggle">
          <input id="autoRefresh" type="checkbox" onchange="toggleJob('auto_refresh', this.checked)">
          <span class="toggle-slider"></span>
        </span>
        <span>自动刷新 (401/403)</span>
      </label>
    </div>
  </article>
</section>

<section class="grid cols-2 animate-in" style="animation-delay:0.12s;">
  <article class="panel">
    <div class="panel-header">
      <h3>任务控制</h3>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn ok" onclick="manualRegisterOnce()" id="btnRegister">
        <span class="btn-label" style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 1v12M1 7h12"/></svg>
          手动注册 1 个
        </span>
      </button>
      <button class="btn warn" onclick="manualRefill()" id="btnRefill">
        <span class="btn-label" style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 7a6 6 0 1 1 2-4.5"/><path d="M1 1v6h6"/></svg>
          补池到目标值
        </span>
      </button>
      <button class="btn" onclick="exportAccountsConfig()">
        <span class="btn-label" style="display:flex;align-items:center;gap:6px;">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 1v8M3 5l4 4 4-4"/><path d="M1 11v1a1 1 0 001 1h10a1 1 0 001-1v-1"/></svg>
          导出配置
        </span>
      </button>
    </div>
    <div class="toast mono muted" id="actionToast" style="font-size:0.82rem;margin-top:10px;"></div>
  </article>

  <article class="panel">
    <div class="panel-header">
      <h3>运行配置</h3>
    </div>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px;">
      <label style="font-size:0.80rem;color:var(--muted);font-weight:500;display:flex;flex-direction:column;gap:5px;">池目标
        <input id="poolTarget" type="number" min="1" />
      </label>
      <label style="font-size:0.80rem;color:var(--muted);font-weight:500;display:flex;flex-direction:column;gap:5px;">注册并发
        <input id="registerConcurrency" type="number" min="1" />
      </label>
    </div>
    <label style="display:flex;flex-direction:column;gap:5px;margin-top:12px;font-size:0.80rem;color:var(--muted);font-weight:500;">代理
      <input id="proxy" type="text" placeholder="http://127.0.0.1:7890" />
    </label>
    <button class="btn" style="margin-top:14px;width:100%;" onclick="saveConfig()" id="btnSave">
      <span class="btn-label" style="display:flex;align-items:center;justify-content:center;gap:6px;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 1L5 7l-4-4"/><path d="M1 13h12"/></svg>
        保存配置
      </span>
    </button>
  </article>
</section>

<section class="panel animate-in" style="margin-top:16px;animation-delay:0.22s;">
  <div class="panel-header">
    <h3>最近事件</h3>
    <span class="muted mono" style="font-size:0.75rem;" id="eventCount"></span>
  </div>
  <div id="recentEvents" style="max-height:400px;overflow:auto;"></div>
</section>

<script>
  function animateNumber(el, target, duration) {
    duration = duration || 600;
    var start = parseInt(el.textContent) || 0;
    if (start === target) return;
    var startTime = performance.now();
    function step(now) {
      var progress = Math.min((now - startTime) / duration, 1);
      var ease = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(start + (target - start) * ease);
      if (progress < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function api(url, options = {}) {
    return fetch(url, {
      headers: { "Content-Type": "application/json" },
      ...options,
    }).then(async res => {
      const text = await res.text();
      if (!res.ok) throw new Error(text || `HTTP ${res.status}`);
      return text ? JSON.parse(text) : {};
    });
  }

  function setBtnLoading(btn, loading) {
    if (loading) {
      btn.disabled = true;
      btn.querySelector(".btn-label").innerHTML = '<span class="spinner"></span>处理中...';
    } else {
      btn.disabled = false;
      const label = btn.querySelector(".btn-label");
      label.textContent = btn.dataset.originalLabel || label.textContent;
    }
  }

  function formatTime(ts) {
    if (!ts) return "-";
    const d = new Date(ts);
    if (isNaN(d)) return ts;
    return d.toLocaleString("zh-CN", { hour12: false });
  }

  function renderEvents(events) {
    const container = document.getElementById("recentEvents");
    document.getElementById("eventCount").textContent = `${events.length} 条`;
    if (!events.length) {
      container.innerHTML = '<div class="muted" style="padding:24px;text-align:center;">暂无事件</div>';
      return;
    }
    container.innerHTML = events.slice().reverse().map(ev => {
      const time = ev.ts || ev.time || ev.timestamp || "";
      const event = ev.event || "";
      const msg = ev.message || ev.msg || JSON.stringify(ev);
      let color = "var(--muted)";
      let severity = "";
      const level = (ev.level || "").toLowerCase();
      const lower = (msg + event).toLowerCase();
      if (level === "error" || lower.includes("error") || lower.includes("fail") || lower.includes("错误")) { color = "var(--err)"; severity = "err"; }
      else if (level === "warn") { color = "var(--warn)"; severity = "warn"; }
      else if (lower.includes("success") || lower.includes("完成") || lower.includes("ok") || lower.includes("imported")) { color = "var(--ok)"; severity = "ok"; }
      else if (lower.includes("refresh") || lower.includes("刷新")) { color = "var(--accent)"; severity = "accent"; }
      return `<div class="event-item" data-severity="${severity}">
        <span class="mono muted" style="flex-shrink:0;width:135px;font-size:0.76rem;">${formatTime(time)}</span>
        ${event ? `<span class="mono" style="flex-shrink:0;color:var(--muted);font-size:0.72rem;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:0.6;">${event}</span>` : ""}
        <span style="color:${color};flex:1;word-break:break-all;">${msg}</span>
      </div>`;
    }).join("");
  }

  async function loadStatus() {
    try {
      const data = await api("/api/status");
      const active = data.pool.active || 0;
      const target = data.pool.target || 1;
      const running = !!data.scheduler.scheduler_running;

      animateNumber(document.getElementById("activeCount"), active);
      animateNumber(document.getElementById("targetCount"), target);
      document.title = `(${active}/${target}) 总览 - OpenAI Register Ops`;

      const pct = Math.min(100, Math.round((active / target) * 100));
      const bar = document.getElementById("poolProgress");
      bar.style.width = pct + "%";
      bar.style.background = pct >= 80 ? "var(--ok)" : pct >= 40 ? "var(--warn)" : "var(--err)";
      document.getElementById("poolRatio").textContent = `${active} / ${target}  (${pct}%)`;

      const schedEl = document.getElementById("schedulerState");
      schedEl.textContent = running ? "运行中" : "已停止";
      schedEl.style.color = running ? "var(--ok)" : "var(--err)";
      const iconEl = document.getElementById("schedulerIcon");
      iconEl.style.background = running ? "var(--ok-dim)" : "var(--err-dim)";
      iconEl.style.color = running ? "var(--ok)" : "var(--err)";

      document.getElementById("autoRegister").checked = !!data.config.auto_register_enabled;
      document.getElementById("autoRefresh").checked = !!data.config.auto_refresh_enabled;
      document.getElementById("poolTarget").value = data.config.pool_target;
      document.getElementById("registerConcurrency").value = data.config.register_concurrency;
      document.getElementById("concurrencyDisplay").textContent = data.config.register_concurrency;
      document.getElementById("proxy").value = data.config.proxy || "";

      renderEvents(data.last_events || []);
      document.getElementById("lastRefresh").textContent = "更新于 " + new Date().toLocaleTimeString("zh-CN", { hour12: false });
    } catch (err) {
      console.error("loadStatus error:", err);
    }
  }

  async function manualRegisterOnce() {
    const btn = document.getElementById("btnRegister");
    setBtnLoading(btn, true);
    try {
      const data = await api("/api/register/once", { method: "POST" });
      showToast(data.ok ? "注册任务执行完成" : "注册任务失败", data.ok ? "ok" : "err");
    } catch (err) {
      showToast(String(err), "err");
    } finally {
      setBtnLoading(btn, false);
      await loadStatus();
    }
  }

  async function manualRefill() {
    const btn = document.getElementById("btnRefill");
    setBtnLoading(btn, true);
    try {
      const data = await api("/api/register/refill", { method: "POST" });
      showToast(`补池完成: +${data.registered || 0}, fail=${data.failed || 0}`, "ok");
    } catch (err) {
      showToast(String(err), "err");
    } finally {
      setBtnLoading(btn, false);
      await loadStatus();
    }
  }

  function exportAccountsConfig() {
    window.location.href = "/api/accounts/export";
    showToast("已开始下载账号配置", "ok");
  }

  async function toggleJob(job, enabled) {
    try {
      await api("/api/jobs/toggle", {
        method: "POST",
        body: JSON.stringify({ job, enabled }),
      });
      showToast(`${job} 已${enabled ? "开启" : "关闭"}`, "ok");
    } catch (err) {
      showToast(String(err), "err");
    }
  }

  async function saveConfig() {
    const btn = document.getElementById("btnSave");
    setBtnLoading(btn, true);
    const payload = {
      pool_target: Number(document.getElementById("poolTarget").value),
      register_concurrency: Number(document.getElementById("registerConcurrency").value),
      proxy: document.getElementById("proxy").value || null,
    };
    try {
      await api("/api/config", {
        method: "PATCH",
        body: JSON.stringify(payload),
      });
      showToast("配置已保存", "ok");
    } catch (err) {
      showToast(String(err), "err");
    } finally {
      setBtnLoading(btn, false);
      await loadStatus();
    }
  }

  document.querySelectorAll(".btn").forEach(btn => {
    const label = btn.querySelector(".btn-label");
    if (label) btn.dataset.originalLabel = label.textContent;
  });

  loadStatus();
  setInterval(loadStatus, 15000);
</script>
{% endblock %}
